name: Deploy to EC2

on:
  push:
    branches:
      - main  # Trigger deployment on push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            if [ ! -d "/home/ubuntu/new_code/knockes_backend-feature-user-management-prod/knockes_backend-feature-user-management-prod/.git" ]; then
              echo "Repo not found. Cloning fresh..."
              git clone -b feature/user-management-prod https://github.com/roboxoXd3/knockes_backend.git /home/ubuntu/new_code/knockes_backend-feature-user-management-prod/knockes_backend-feature-user-management-prod
            else
              echo "Repo found. Pulling latest changes..."
              cd /home/ubuntu/new_code/knockes_backend-feature-user-management-prod/knockes_backend-feature-user-management-prod
              git pull origin feature/user-management-prod
            fi

            echo "Installing dependencies..."
            cd /home/ubuntu/new_code/knockes_backend-feature-user-management-prod/knockes_backend-feature-user-management-prod
            pip3 install -r requirements.txt

            echo "Running database migrations..."
            python3 manage.py migrate

            echo "Collecting static files..."
            python3 manage.py collectstatic --noinput

            echo "Restarting Gunicorn service..."
            sudo systemctl restart gunicorn
          EOF
